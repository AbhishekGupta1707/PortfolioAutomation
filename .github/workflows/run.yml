name: Run Portfolio Script

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pandas openpyxl yfinance matplotlib scipy seaborn

    - name: Run script
      env:
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: python "Market risk and Stress test_Final.py"
